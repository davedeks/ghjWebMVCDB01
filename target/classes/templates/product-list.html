<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>JWebMVCDB01 Product List 01</title>
</head>
<body style="background-color:hsl(0, 0%, 100%);">
    <h1 style="color: hwb(0 0% 100%); text-decoration: underline">Products 01</h1>
    <br/><br/>
    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
        </tr>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}">1</td>
            <td th:text="${product.name}">Name</td>
            <td th:text="${product.price}">0.00</td>
        </tr>
    </table>
    <a href="/products/new">Add New Product</a>
</body>
</html>
